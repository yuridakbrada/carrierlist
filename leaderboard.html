<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<div class="players">

<header class="header">
    <div class="top-bar">
<div class="logo">
    <a href="index.html">
        <img src="carrierlist_logo.png" height="75px">
    </a>
</div>
</div>

    <div class="sub-bar">
        <a href="index.html" class="sub-item">Main List</a>
        <a href="extended.html" class="sub-item">Extended List</a>
        <a href="legacy.html" class="sub-item">Legacy List</a>
        <a href="#" class="sub-item active">Leaderboard</a>
    </div>
</header>

<section class="list">

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Pesquisar jogador...">
</div>

    <div class="card">
        <h1><a href="player/index1.html">1. Andre0997</a></h1>
    </div>

    <div class="card">
        <h1><a href="player/index2.html">2. Liuytz</a></h1>
    </div>   
    
    <div class="card">
        <h1><a href="player/index3.html">3. RuhtraGG</a></h1>
    </div>

    <div class="card">
        <h1><a href="player/index4.html">4. Nobre100</a></h1>
    </div>

    <div class="card">
        <h1><a href="player/index5.html">5. DragonPlayssYT</a></h1>
    </div>

    <div class="card">
        <h1><a href="player/index6.html">6. Natanbarros</a></h1>
    </div>

    <div class="card">
        <h1><a href="player/index7.html">7. VeryLixQ</a></h1>
    </div>

    </div>

    <div class="card">
        <h1><a href="player/index9.html">9. AlemaneiroGD</a></h1>
    </div>

    <div class="card">
        <h1><a href="player/index10.html">10. SpeedPotatoPC</a></h1>
    </div>

    </section>

<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("input", function () {
    const value = searchInput.value.toLowerCase();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();

        if (text.includes(value)) {
            card.style.display = "";
        } else {
            card.style.display = "none";
        }
    });
});
</script>
    
</body>
</html>
